<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% if page.title %}{{ page.title | escape }} | {% endif %}{{ site.title |
      escape }}
    </title>
    <meta
      name="description"
      content="{{ page.description | default: site.description | escape }}"
    />
    {% seo title=false %}
    <link
      rel="icon"
      href="{{ '/assets/images/logo-small_yalc.png' | relative_url }}"
    />
    <link
      rel="stylesheet"
      href="{{ '/assets/vendor/prism/prism-tomorrow.min.css' | relative_url }}"
    />
    <link
      rel="stylesheet"
      href="{{ '/assets/css/nestjs-yalc-site.css' | relative_url }}"
    />
  </head>
  <body class="ny-site ny-site--landing">
    <header class="ny-topbar">
      <a
        class="ny-brand"
        href="{{ '/' | relative_url }}"
        aria-label="NestJS-YALC home"
      >
        <img
          src="{{ '/assets/images/logo-small_yalc.png' | relative_url }}"
          alt=""
          width="34"
          height="34"
        />
        <span>NestJS-YALC</span>
      </a>

      <nav class="ny-topnav" aria-label="Primary navigation">
        <a href="{{ '/getting-started' | relative_url }}">Start</a>
        <a href="{{ '/documentation' | relative_url }}">Docs</a>
        <a class="ny-logo-link" href="https://www.nestdev.it/" aria-label="NestDevLab">
          <img src="https://www.nestdev.it/assets/logo-nestdev.png" width="23" height="23" alt="" />
        </a>
        <a class="ny-icon-link" href="https://github.com/NestDevLab/nestjs-yalc" aria-label="NestJS-YALC on GitHub">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M12 .5a12 12 0 0 0-3.8 23.39c.6.11.82-.26.82-.58v-2.02c-3.34.73-4.04-1.61-4.04-1.61-.55-1.38-1.34-1.75-1.34-1.75-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23A11.5 11.5 0 0 1 12 5.82c1.02 0 2.04.14 3 .41 2.29-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 12 .5Z" />
          </svg>
        </a>
        <a class="ny-icon-link" href="https://discord.gg/V4Ja2Thkhn" aria-label="Join NestDevLab on Discord">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="currentColor" d="M20.3 4.37A19.8 19.8 0 0 0 15.36 2c-.21.38-.46.89-.63 1.3a18.4 18.4 0 0 0-5.47 0c-.18-.41-.42-.92-.64-1.3a19.74 19.74 0 0 0-4.94 2.38C.55 9.08-.3 13.67.12 18.2a19.9 19.9 0 0 0 6.06 3.07c.49-.67.92-1.37 1.29-2.1a12.9 12.9 0 0 1-2.03-.97c.17-.12.33-.25.49-.38a14.15 14.15 0 0 0 12.14 0l.49.38c-.65.38-1.33.7-2.04.97.37.73.8 1.43 1.29 2.1a19.86 19.86 0 0 0 6.06-3.07c.5-5.24-.84-9.79-3.57-13.83ZM8.02 15.42c-1.18 0-2.15-1.08-2.15-2.41s.95-2.42 2.15-2.42c1.21 0 2.18 1.09 2.15 2.42 0 1.33-.95 2.41-2.15 2.41Zm7.96 0c-1.18 0-2.15-1.08-2.15-2.41s.95-2.42 2.15-2.42c1.21 0 2.18 1.09 2.15 2.42 0 1.33-.94 2.41-2.15 2.41Z" />
          </svg>
        </a>
      </nav>
    </header>

    <main class="ny-main ny-main--landing">{{ content }}</main>

    <footer class="ny-footer">
      <span>NestJS-YALC documentation</span>
      <a class="ny-logo-link" href="https://www.nestdev.it/" aria-label="NestDevLab">
        <img src="https://www.nestdev.it/assets/logo-nestdev.png" width="23" height="23" alt="" />
      </a>
      <a class="ny-icon-link" href="https://discord.gg/V4Ja2Thkhn" aria-label="Join NestDevLab on Discord">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M20.3 4.37A19.8 19.8 0 0 0 15.36 2c-.21.38-.46.89-.63 1.3a18.4 18.4 0 0 0-5.47 0c-.18-.41-.42-.92-.64-1.3a19.74 19.74 0 0 0-4.94 2.38C.55 9.08-.3 13.67.12 18.2a19.9 19.9 0 0 0 6.06 3.07c.49-.67.92-1.37 1.29-2.1a12.9 12.9 0 0 1-2.03-.97c.17-.12.33-.25.49-.38a14.15 14.15 0 0 0 12.14 0l.49.38c-.65.38-1.33.7-2.04.97.37.73.8 1.43 1.29 2.1a19.86 19.86 0 0 0 6.06-3.07c.5-5.24-.84-9.79-3.57-13.83ZM8.02 15.42c-1.18 0-2.15-1.08-2.15-2.41s.95-2.42 2.15-2.42c1.21 0 2.18 1.09 2.15 2.42 0 1.33-.95 2.41-2.15 2.41Zm7.96 0c-1.18 0-2.15-1.08-2.15-2.41s.95-2.42 2.15-2.42c1.21 0 2.18 1.09 2.15 2.42 0 1.33-.94 2.41-2.15 2.41Z" />
        </svg>
      </a>
      <span
        >Production-proof NestJS architecture for CRUD, module boundaries, and
        event-driven operations.</span
      >
    </footer>
    <script
      defer
      src="{{ '/assets/vendor/prism/prism-core.min.js' | relative_url }}"
    ></script>
    <script
      defer
      src="{{ '/assets/vendor/prism/prism-clike.min.js' | relative_url }}"
    ></script>
    <script
      defer
      src="{{ '/assets/vendor/prism/prism-javascript.min.js' | relative_url }}"
    ></script>
    <script
      defer
      src="{{ '/assets/vendor/prism/prism-typescript.min.js' | relative_url }}"
    ></script>
  </body>
</html>
